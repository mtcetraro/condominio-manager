name: Continuous Integration

on:
  push:
    branches: ["main", "feature-*"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Scarica il codice dalla repository
      - name: Checkout del codice sorgente
        uses: actions/checkout@v3

      # Step 2: Configura Java 21
      - name: Configurazione Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Step 3: Compila il codice ed esegue TUTTI i test unitari (JUnit 5)
      - name: Esecuzione Test Unitari
        run: mvn clean test
