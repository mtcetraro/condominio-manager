# Pipeline di Continuous Integration
# Si attiva ad ogni push e ad ogni Pull Request

name: Continuous Integration

on:
  push:
    branches: ["main", "feature-*"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Scarica il codice dalla repository
      - name: Checkout del codice sorgente
        uses: actions/checkout@v3

      # Step 2: Configura Java
      # Step 2: Configura Java 11
      - name: Configurazione java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Step 3: Compilazione del main
      - name: Compilazione
        run: mvn compile exec:java "-Dexec.mainClass=it.mtcetraro.condominio.Main"
